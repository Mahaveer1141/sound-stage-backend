services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sound_stage_app
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - sound_stage_network

  postgres:
    image: postgres:18-alpine
    container_name: sound_stage_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sound_stage}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sound_stage_network

  redis:
    image: redis:8-alpine
    container_name: sound_stage_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - sound_stage_network

volumes:
  postgres_data:
  redis_data:

networks:
  sound_stage_network:
    driver: bridge
